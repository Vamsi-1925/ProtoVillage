<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ProtoVillage Ops</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&amp;family=Raleway:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#3f484a",
                    "inverse-primary": "#8dd2da",
                    "on-secondary-fixed-variant": "#004f52",
                    "on-secondary-fixed": "#002021",
                    "surface-container-low": "#121212", // overridden for dark theme
                    "primary-fixed": "#a9eef7",
                    "surface-dim": "#dcdad6",
                    "inverse-on-surface": "#f3f0ec",
                    "primary-fixed-dim": "#8dd2da",
                    "surface-variant": "#e5e2de",
                    "on-error": "#ffffff",
                    "on-surface": "#e0e0e0", // Warm light grey for text
                    "secondary-fixed": "#91f2f7",
                    "tertiary-container": "#825800",
                    "primary-container": "#1e6a72",
                    "on-tertiary-fixed-variant": "#614000",
                    "on-primary-fixed-variant": "#004f56",
                    "secondary-fixed-dim": "#74d6db",
                    "inverse-surface": "#31302e",
                    "on-tertiary": "#ffffff",
                    "on-secondary-container": "#007074",
                    "secondary": "#00696d",
                    "surface-tint": "#1b6870",
                    "on-primary-container": "#a2e7f0",
                    "tertiary-fixed": "#ffddaf",
                    "surface": "#121212", // Card surface
                    "surface-container-high": "#ebe8e4",
                    "on-background": "#e0e0e0",
                    "background": "#000000", // OLED base
                    "tertiary-fixed-dim": "#f8bc5a",
                    "secondary-container": "#91f2f7",
                    "surface-container-highest": "#e5e2de",
                    "outline": "#6f797a",
                    "error-container": "#ffdad6",
                    "on-secondary": "#1D1D1B", // Dark charcoal for secondary text
                    "on-primary": "#ffffff",
                    "error": "#ba1a1a",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#f0edea",
                    "on-tertiary-container": "#ffd597",
                    "tertiary": "#634200",
                    "surface-bright": "#fcf9f5",
                    "primary": "#1E6A72", // Teal
                    "on-error-container": "#93000a",
                    "on-primary-fixed": "#001f23",
                    "outline-variant": "#3f484a", // adjusted for dark
                    "on-tertiary-fixed": "#281800",
                    // Brand Specific
                    "brand-secondary": "#46ABB0",
                    "brand-charcoal": "#1D1D1B"
            },
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Raleway"],
                    "display": ["Raleway"],
                    "body": ["Nunito Sans"],
                    "label": ["Nunito Sans"]
            }
          }
        }
      }
    </script>
<style>
        body {
            background-color: #000000;
            color: #e0e0e0;
        }
    </style>
</head>
<body class="font-body min-h-screen flex items-center justify-center p-4">
<!-- Language Toggle -->
<div class="fixed top-6 right-6 z-50">
<div class="flex items-center space-x-2 bg-surface rounded-full px-3 py-1 shadow-md border border-outline-variant">
<button class="font-label text-sm font-bold text-on-surface hover:text-inverse-primary transition-colors">EN</button>
<span class="text-outline-variant">|</span>
<button class="font-label text-sm text-outline hover:text-inverse-primary transition-colors">TE</button>
</div>
</div>
<!-- Login Container -->
<div class="w-full max-w-md bg-surface rounded-lg p-8 shadow-2xl border border-outline-variant/30 flex flex-col space-y-8">
<!-- Header -->
<div class="text-center space-y-2">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container mb-4">
<span class="material-symbols-outlined text-4xl text-on-primary" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<h1 class="font-headline font-bold text-3xl text-on-surface">Welcome Back</h1>
<p class="font-body text-outline">ProtoVillage Operations Management</p>
</div>
<!-- Form -->
<form class="space-y-6">
<div class="space-y-4">
<!-- Phone / Username -->
<div>
<label class="block font-label text-sm font-bold text-on-surface mb-1" for="identifier">Phone Number or Username</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded bg-background text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-outline" id="identifier" placeholder="Enter your details" type="text"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block font-label text-sm font-bold text-on-surface mb-1" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded bg-background text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-outline" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center">
<input class="form-checkbox h-4 w-4 text-primary rounded border-outline-variant bg-background focus:ring-primary" type="checkbox"/>
<span class="ml-2 font-body text-sm text-outline">Remember me</span>
</label>
<a class="font-label text-sm font-bold text-inverse-primary hover:text-primary-fixed transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Actions -->
<div class="space-y-4 pt-2">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-DEFAULT shadow-sm font-label text-sm font-bold text-on-primary bg-primary hover:bg-primary-container transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-background" type="button">
                    Sign In
                </button>
<button class="w-full flex items-center justify-center py-3 px-4 rounded-DEFAULT font-label text-sm font-bold text-brand-charcoal bg-brand-secondary hover:bg-inverse-primary transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-secondary focus:ring-offset-background" type="button">
<span class="material-symbols-outlined mr-2 text-sm">fingerprint</span>
                    Biometric Login
                </button>
</div>
</form>
<!-- Footer -->
<div class="text-center pt-4 border-t border-outline-variant/30">
<p class="font-body text-xs text-outline">
                Having trouble? <a class="font-label font-bold text-inverse-primary hover:text-primary-fixed transition-colors" href="#">Contact Administrator</a>
</p>
</div>
</div>
</body></html>
