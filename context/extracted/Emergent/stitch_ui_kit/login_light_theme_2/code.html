<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ProtoVillage Ops</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700&amp;family=Nunito+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface-variant": "#3f484a",
                        "inverse-primary": "#8dd2da",
                        "on-secondary-fixed-variant": "#004f52",
                        "on-secondary-fixed": "#002021",
                        "surface-container-low": "#f6f3ef",
                        "primary-fixed": "#a9eef7",
                        "surface-dim": "#dcdad6",
                        "inverse-on-surface": "#f3f0ec",
                        "primary-fixed-dim": "#8dd2da",
                        "surface-variant": "#e5e2de",
                        "on-error": "#ffffff",
                        "on-surface": "#1c1c1a",
                        "secondary-fixed": "#91f2f7",
                        "tertiary-container": "#825800",
                        "primary-container": "#1e6a72",
                        "on-tertiary-fixed-variant": "#614000",
                        "on-primary-fixed-variant": "#004f56",
                        "secondary-fixed-dim": "#74d6db",
                        "inverse-surface": "#31302e",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#007074",
                        "secondary": "#00696d",
                        "surface-tint": "#1b6870",
                        "on-primary-container": "#a2e7f0",
                        "tertiary-fixed": "#ffddaf",
                        "surface": "#fcf9f5",
                        "surface-container-high": "#ebe8e4",
                        "on-background": "#1c1c1a",
                        "background": "#fcf9f5",
                        "tertiary-fixed-dim": "#f8bc5a",
                        "secondary-container": "#91f2f7",
                        "surface-container-highest": "#e5e2de",
                        "outline": "#6f797a",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#f0edea",
                        "on-tertiary-container": "#ffd597",
                        "tertiary": "#634200",
                        "surface-bright": "#fcf9f5",
                        "primary": "#005158",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#001f23",
                        "outline-variant": "#bec8ca",
                        "on-tertiary-fixed": "#281800",
                        "cream": "#FDFAE4",
                        "warm-sand": "#D9C8A2",
                        "charcoal": "#1D1D1B",
                        "primary-teal": "#1E6A72",
                        "secondary-teal": "#46ABB0"
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Raleway", "sans-serif"],
                        body: ["Nunito Sans", "sans-serif"],
                        label: ["Nunito Sans", "sans-serif"]
                    },
                    boxShadow: {
                        'ambient': '0 16px 32px rgba(29, 29, 27, 0.08)'
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Nunito Sans', sans-serif; background-color: #FDFAE4; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Raleway', sans-serif; }
    </style>
</head>
<body class="bg-cream min-h-screen flex items-center justify-center p-4">
<!-- Language Toggle (Top Right) -->
<div class="fixed top-6 right-6 z-50">
<div class="flex bg-white rounded-full shadow-sm p-1 border border-warm-sand">
<button class="px-6 py-2 rounded-full bg-primary-teal text-white font-bold text-sm transition-colors">
                EN
            </button>
<button class="px-6 py-2 rounded-full text-charcoal font-bold text-sm hover:bg-surface-container-low transition-colors">
                TE
            </button>
</div>
</div>
<!-- Centered Login Card -->
<div class="w-full max-w-md bg-white rounded-xl shadow-ambient p-8 md:p-10">
<!-- Header -->
<div class="text-center mb-10">
<div class="w-16 h-16 bg-primary-teal rounded-full flex items-center justify-center mx-auto mb-6">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">
                    eco
                </span>
</div>
<h1 class="font-headline font-bold text-3xl text-charcoal mb-3">ProtoVillage Ops</h1>
<p class="text-on-surface-variant text-base leading-relaxed">
                One simple app to plan, do, verify and fund village operations.
            </p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Email -->
<div class="space-y-2">
<label class="block font-bold text-sm text-charcoal" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full pl-12 pr-4 py-3 rounded-lg border border-warm-sand bg-white text-charcoal focus:border-primary-teal focus:ring-2 focus:ring-primary-teal/20 outline-none transition-all" id="email" placeholder="Enter your email" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="block font-bold text-sm text-charcoal" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full pl-12 pr-4 py-3 rounded-lg border border-warm-sand bg-white text-charcoal focus:border-primary-teal focus:ring-2 focus:ring-primary-teal/20 outline-none transition-all" id="password" placeholder="Enter your password" required="" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-4 space-y-4">
<button class="w-full bg-primary-teal hover:bg-primary text-white font-bold py-3 px-6 rounded-lg shadow-sm hover:shadow-ambient hover:-translate-y-0.5 transition-all duration-200" type="button">
                    Sign in
                </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-warm-sand"></div>
<span class="flex-shrink-0 mx-4 text-outline text-sm">or</span>
<div class="flex-grow border-t border-warm-sand"></div>
</div>
<button class="w-full bg-secondary-teal hover:bg-secondary text-charcoal font-bold py-3 px-6 rounded-lg transition-colors duration-200" type="button">
                    Try demo
                </button>
</div>
</form>
</div>
</body></html>
